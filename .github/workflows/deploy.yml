name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/twinky

            git pull origin master

            cd server
            npm ci
            cd ..

            cd client
            npm ci
            VITE_SERVER_URL=${{ secrets.VITE_SERVER_URL }} npm run build
            cd ..

            pm2 restart twinky-server
